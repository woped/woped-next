name: "Bug Report"
description: "Report a defect with reproducible steps"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why this matters, related issues/links
      placeholder: "Related issue #, link, or short rationale"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered steps
      placeholder: "1. ...\n2. ..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste logs or add screenshots
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: "- [ ] ...\n- [ ] ..."
    validations:
      required: true
