name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # TODO(Task 1 follow-up): enable after existing TS errors are fixed (~37).
      # Run locally: npm run typecheck
      # - name: TypeScript check
      #   run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
