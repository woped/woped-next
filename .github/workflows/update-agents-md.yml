name: Update AGENTS.md

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  update-agents-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: openai/gpt-4.1-mini
          prompt: |
            Look at the diff from the last commit (`git diff HEAD~1`).
            Check if AGENTS.md or files in `docs/` need updating.
            If updates are needed, make them and create a PR with title
            `chore: <short description of what changed>`.
            If nothing needs updating, do nothing.
