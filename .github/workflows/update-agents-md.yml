name: Update AGENTS.md

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 06:00 UTC — keep AI context in sync with structure changes
    - cron: '0 6 * * 1'
  # Run when structural PRs are merged (read-only checkout on main; output is always a new PR branch)
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'src/stores/**'
      - 'src/services/**'
      - 'src/composables/**'
      - 'src/components/**'
      - '.github/workflows/**'
      - '.cursor/rules/**'
      - 'scripts/generate-agents-context.mjs'
      - 'scripts/validate-agents-md-structure.mjs'
      - 'scripts/update-agents-md.prompt.txt'

concurrency:
  group: update-agents-md
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-agents-md:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Token required so create-pull-request can push a branch (never pushes to main)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse repository structure
        run: node scripts/generate-agents-context.mjs

      - name: Verify API key for OpenCode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Add ANTHROPIC_API_KEY or OPENAI_API_KEY repository secret for OpenCode."
            exit 1
          fi

      - name: Update structural sections with OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          # OpenCode edits files only; git/PR is handled by create-pull-request below
          use_github_token: false
          prompt: |
            You are updating AGENTS.md for the WoPeD Next repository (browser Petri net editor, Vue 3 + Vite + Pinia).

            Read `.github/agents-md-context.json` first. It contains machine-parsed structural facts from the repository.

            Update AGENTS.md so structural sections match the context file and the actual codebase. Improve in place; do not replace the whole file.

            MUST keep accurate: Tech Stack table; Repository Structure tree; Application entry points; Architecture mermaid (all Pinia stores from context); Pinia stores list; Services tree; Build & Development Commands; "Not in this repository today" bullets; workflow references.

            MUST NOT rewrite: Development Conventions examples, i18n/styling prose, AI Agent Guidelines (except factual repo layout fixes), Contribution Workflow.

            English only. Do not invent paths or features. Edit only AGENTS.md.

            Do NOT run git commands, commit, push, or open pull requests.

            Full instructions are also in `scripts/update-agents-md.prompt.txt`.

      - name: Validate AGENTS.md against parsed context
        run: node scripts/validate-agents-md-structure.mjs

      - name: Detect AGENTS.md changes
        id: changes
        run: |
          if git diff --quiet -- AGENTS.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No AGENTS.md changes — skipping PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "AGENTS.md changed — will open a pull request."
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: chore/update-agents-md
          delete-branch: true
          title: 'chore: sync AGENTS.md structural context'
          commit-message: 'chore: sync AGENTS.md structural context'
          body: |
            ## Summary

            Automated sync of **structural** sections in `AGENTS.md` using [OpenCode](https://opencode.ai) and parsed repository context.

            - Context generated by `scripts/generate-agents-context.mjs`
            - Structural validation: `scripts/validate-agents-md-structure.mjs`

            ## Review

            Please check that conventions, i18n, and agent-guideline prose were not unintentionally shortened.

            ---
            _Workflow: `.github/workflows/update-agents-md.yml` — changes land via PR only, not direct push to `main`._
          labels: |
            documentation
            chore
