name: Update AGENTS.md

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-agents-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Analyze and update docs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL: openai/gpt-4.1-mini
        run: |
          opencode "Look at the diff from the last commit (run: git diff HEAD~1).
          Check if AGENTS.md or files in docs/ need updating.
          If updates are needed:
          1. Make the necessary changes
          2. Create a new branch: git checkout -b chore/update-docs-\$(date +%Y%m%d-%H%M%S)
          3. Commit the changes
          4. Push the branch
          5. Create a PR using: gh pr create --title 'chore: update docs' --body 'Auto-generated docs update based on recent changes.'
          If nothing needs updating, just say so and do nothing."
