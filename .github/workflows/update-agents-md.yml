name: Update AGENTS.md

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  update-agents-md:
    if: github.actor != 'opencode-agent[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: openai/gpt-4.1-mini
          prompt: |
            Look at the new code introduced in this PR.
            Update AGENTS.md and/or files in docs/ to document any new additions.

            Guidelines:
            - New composables → add to the composables table in AGENTS.md
            - New components → add to the directory structure or component list
            - New services → document in the services section
            - New features → add relevant sections

            Follow existing conventions in AGENTS.md and docs/.
            Commit all changes to this PR branch.
            If nothing new was added that needs documentation, do nothing.
