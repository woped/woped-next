name: Update AGENTS.md

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-agents-md:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Analyze and update docs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL: openai/gpt-4.1-mini
        run: |
          opencode "Recent commits on main (run: git log --oneline -5).
          Check if AGENTS.md or files in docs/ need updating based on recent changes.
          If updates are needed:
          1. Make the necessary changes
          2. Create a new branch and push it
          3. Create a PR using: gh pr create --title 'chore: update docs' --body 'Auto-generated docs update based on recent changes.'
          If nothing needs updating, just say so and do nothing.
          Important: never push to main. Always create a new branch and open a PR."
