name: Update AGENTS.md

on:
  workflow_dispatch:
  schedule:
    # Daily 06:00 UTC — keep AI context in sync with structure changes
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'src/stores/**'
      - 'src/services/**'
      - 'src/composables/**'
      - 'src/components/**'
      - '.github/workflows/**'
      - '.cursor/rules/**'
      - 'scripts/generate-agents-context.mjs'
      - 'scripts/validate-agents-md-structure.mjs'
      - 'scripts/update-agents-md.prompt.txt'

concurrency:
  group: update-agents-md
  cancel-in-progress: true

jobs:
  update-agents-md:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Parse repository structure
        run: node scripts/generate-agents-context.mjs

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: openai/gpt-5.3-codex
          prompt: |
            You are updating AGENTS.md for the WoPeD Next repository (browser Petri net editor, Vue 3 + Vite + Pinia).

            Read `scripts/update-agents-md.prompt.txt` and `.github/agents-md-context.json`, then follow those instructions exactly.

            After editing AGENTS.md, run `node scripts/validate-agents-md-structure.mjs` and fix any errors.

            If AGENTS.md changed and validation passes, open a pull request titled
            `chore: sync AGENTS.md structural context` with labels `documentation` and `chore`.
            If AGENTS.md already matches the context, make no changes and do not open a PR.

      - name: Validate AGENTS.md against parsed context
        run: node scripts/validate-agents-md-structure.mjs
