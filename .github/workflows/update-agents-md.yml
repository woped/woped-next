name: Update AGENTS.md

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  update-agents-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: openai/gpt-4.1-mini
          prompt: |
            Look at this PR's changes. Check if AGENTS.md or files in docs/
            need updating to reflect the changes in this PR.
            If updates are needed, make the changes and commit them to this PR branch.
            If nothing needs updating, do nothing.
