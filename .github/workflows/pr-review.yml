name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: openai/gpt-4.1-mini
          prompt: |
            Review this PR for WoPeD Next (Vue 3 + Pinia Petri net editor).

            Check: i18n (strings in en.ts + de.ts), tests for new logic,
            CSS variables instead of hardcoded colors, TypeScript safety,
            nanoid for element IDs, conventions from AGENTS.md.

            Post a review summary as a PR comment.
