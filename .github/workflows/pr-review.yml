name: PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - 'docs/**'
      - '**.md'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: openai/gpt-4.1-mini
          prompt: |
            Review this PR for WoPeD Next.
            Follow conventions in AGENTS.md.
            Check: i18n (en.ts+de.ts), tests, CSS variables, TypeScript safety, nanoid for element IDs.
            Post a review summary as a PR comment.
